<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAZID Utility F020 2026 — PT. IPPI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --blue:#185FA5; --blue-lt:#E6F1FB; --blue-md:#378ADD;
  --red:#A32D2D; --red-lt:#FCEBEB;
  --amber:#854F0B; --amber-lt:#FAEEDA;
  --green:#3B6D11; --green-lt:#EAF3DE;
  --teal:#0F6E56; --teal-lt:#E1F5EE;
  --purple:#3C3489; --purple-lt:#EEEDFE;
  --gray:#5F5E5A; --gray-lt:#F1EFE8;
  --man:#7F77DD; --machine:#378ADD; --material:#1D9E75;
  --method:#BA7517; --measurement:#D85A30; --milieu:#639922;
  --bg:#F5F6F8; --surface:#FFFFFF;
  --border:#E2E4E8; --border2:#C8CDD6;
  --text:#1A1A2E; --text2:#5A6070; --text3:#9099A8;
  --radius:8px; --radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* ─── AUTH SCREEN ─── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0C2D5A 0%,#185FA5 60%,#1D9E75 100%)}
.auth-card{background:#fff;border-radius:16px;padding:40px 48px;text-align:center;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-logo{width:56px;height:56px;background:var(--blue-lt);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:var(--blue)}
.auth-card h1{font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px}
.auth-card p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid var(--border2);border-radius:var(--radius);background:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;color:var(--text)}
.btn-google:hover{background:var(--bg);border-color:var(--blue)}
.btn-google img{width:20px;height:20px}
.auth-footer{font-size:11px;color:var(--text3);margin-top:20px}

/* ─── LAYOUT ─── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#0C2D5A;color:#fff;display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;flex-shrink:0}
.topbar .logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar h1{font-size:14px;font-weight:600;flex:1}
.topbar .sub{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.8)}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4)}
.btn-logout{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.2);color:#fff}

.nav{background:#fff;border-bottom:1px solid var(--border);display:flex;gap:2px;padding:6px 16px}
.nav button{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);border:none;font-size:13px;cursor:pointer;color:var(--text2);background:transparent;font-family:inherit;transition:.15s}
.nav button:hover{background:var(--bg)}
.nav button.active{background:var(--blue-lt);color:var(--blue);font-weight:500}

.main{flex:1;padding:20px;overflow:auto}

/* ─── CARDS & STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.stat-card .label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-card .value{font-size:26px;font-weight:600;line-height:1}
.stat-card .sub{font-size:11px;color:var(--text3)}
.stat-card.danger .value{color:var(--red)}
.stat-card.warn .value{color:var(--amber)}
.stat-card.info .value{color:var(--blue)}
.stat-card.success .value{color:var(--green)}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.chart-card h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px}
.chart-wrap{position:relative;height:200px}

.m6-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.m6-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;text-align:center}
.m6-card .m6-icon{font-size:22px;margin-bottom:6px}
.m6-card .m6-name{font-size:11px;font-weight:600;margin-bottom:2px}
.m6-card .m6-count{font-size:20px;font-weight:700}
.m6-card .m6-sub{font-size:10px;color:var(--text3)}

/* ─── TABLE ─── */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input[type=text]{font-size:12px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:#fff;color:var(--text);font-family:inherit;height:34px}
.toolbar input[type=text]{flex:1;min-width:160px}
.toolbar .count{font-size:12px;color:var(--text3);white-space:nowrap;line-height:34px}

.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;background:#FAFBFC;position:sticky;top:0;z-index:1;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}

/* ─── BADGES ─── */
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.2px}
.b-ehs1{background:var(--green-lt);color:var(--green)}
.b-ehs2{background:var(--blue-lt);color:var(--blue)}
.b-ehs3{background:var(--amber-lt);color:var(--amber)}
.b-ehs4{background:var(--red-lt);color:var(--red)}
.b-sig{background:var(--red-lt);color:var(--red)}
.b-nsig{background:var(--green-lt);color:var(--green)}
.b-domain{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;margin:1px;display:inline-block}

/* ─── FORM ─── */
.form-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;max-width:1000px}
.form-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.form-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:#fff;color:var(--text);font-size:13px;font-family:inherit;transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.fg textarea{resize:vertical;min-height:64px}
.fg .hint{font-size:11px;color:var(--text3);margin-top:2px}
.req{color:var(--red)}

.risk-preview{background:var(--blue-lt);border:1px solid #B5D4F4;border-radius:var(--radius);padding:12px;margin-top:6px}
.risk-preview .rl-label{font-size:11px;color:var(--blue);font-weight:600}
.risk-preview .rl-big{font-size:22px;font-weight:700;margin-top:4px}

/* ─── 6M PANEL ─── */
.panel-6m{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;position:sticky;top:20px;max-height:calc(100vh - 120px);overflow-y:auto}
.panel-6m h3{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.panel-search{width:100%;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);font-size:12px;font-family:inherit;margin-bottom:10px;color:var(--text)}
.panel-search:focus{outline:none;border-color:var(--blue)}
.m6-section{margin-bottom:12px}
.m6-section-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;background:#F5F6F8;border:1px solid var(--border);margin:2px;cursor:pointer;transition:.12s;color:var(--text2);line-height:1.4}
.chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.chip.selected{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:500}
.chip .star{font-size:9px;color:var(--blue)}

/* ─── SELECTED ROOT CAUSE ─── */
.rc-box{min-height:42px;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 8px;background:#fff;display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start;cursor:text}
.rc-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.rc-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:500;border:1px solid transparent}
.rc-placeholder{font-size:11px;color:var(--text3);line-height:1.8}

/* ─── LIBRARY ─── */
.lib-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.lib-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:var(--text2);transition:.12s}
.lib-tab:hover{border-color:var(--border2)}
.lib-tab.active{font-weight:600}
.lib-toolbar{display:flex;gap:8px;margin-bottom:12px}
.lib-toolbar input,.lib-toolbar select{font-size:12px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:#fff;color:var(--text);font-family:inherit;height:34px}
.lib-toolbar input{flex:1}
.lib-list{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.lib-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);transition:.12s}
.lib-item:last-child{border-bottom:none}
.lib-item:hover{background:#FAFBFC}
.lib-num{min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.lib-text{flex:1}
.lib-hazard{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.lib-impact{font-size:11px;color:var(--text2);margin-bottom:4px}
.lib-meta{font-size:10px;color:var(--text3)}
.lib-note{font-size:10px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:3px}
.btn-del{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--text3);transition:.12s}
.btn-del:hover{border-color:var(--red);color:var(--red);background:var(--red-lt)}

.add-form{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.add-form h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}

/* ─── BUTTONS ─── */
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:inherit}
.btn-primary:hover{background:#0C447C}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#fff;color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-secondary:hover{background:var(--bg);color:var(--text)}
.btn-secondary:active{transform:scale(.98)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#fff;display:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);align-items:center;gap:8px}
.toast.success{background:#1D9E75}
.toast.error{background:var(--red)}

/* ─── LOADING ─── */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--text3);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text3);gap:8px}
.empty i{font-size:36px;opacity:.4}
.empty p{font-size:13px}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .chart-grid{grid-template-columns:1fr}
  .m6-summary{grid-template-columns:repeat(3,1fr)}
  .form-layout{grid-template-columns:1fr}
  .panel-6m{position:static;max-height:300px}
  .topbar h1{font-size:12px}
  .topbar .sub{display:none}
  .main{padding:12px}
}
</style>
</head>

// ─── AUTH ───
window.loginGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { showToast('Login gagal: '+e.message,'error'); }
};

window.logout = async () => {
  await signOut(auth);
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
};

onAuthStateChanged(auth, user => {
  if(user){
    currentUser = user;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('userName').textContent = user.displayName?.split(' ')[0]||'User';
    document.getElementById('userAvatar').src = user.photoURL||'';
    initData();
  } else {
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// ─── FIRESTORE ───
async function initData(){
  // Listen HAZID
  const hq = query(collection(db,'hazid'), orderBy('createdAt','asc'));
  onSnapshot(hq, snap => {
    const fresh = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(fresh.length===0 && !hazidSeeded){
      hazidSeeded=true;
      seedHazid();
    } else {
      hazidData = fresh;
      if(activeTab==='dashboard'||activeTab==='viewer') render();
    }
  });
  // Listen Library
  const lq = query(collection(db,'library6m'), orderBy('createdAt','asc'));
  onSnapshot(lq, snap => {
    const fresh = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(fresh.length===0 && !libSeeded){
      libSeeded=true;
      seedLibrary();
    } else {
      libData = fresh;
      if(activeTab==='library'||activeTab==='input') render();
    }
  });
}

async function seedHazid(){
  for(const h of SEED_HAZID){
    await addDoc(collection(db,'hazid'),{...h,createdAt:serverTimestamp(),createdBy:currentUser.email});
  }
}

async function seedLibrary(){
  for(const l of SEED_LIB){
    await addDoc(collection(db,'library6m'),{...l,isDefault:true,createdAt:serverTimestamp(),createdBy:'system'});
  }
}

// ─── NAVIGATION ───
window.showTab = (t) => {
  activeTab = t;
  document.querySelectorAll('#mainNav button').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','viewer','input','library'][i]===t);
  });
  formRC = [];
  render();
};

function render(){
  destroyCharts();
  const c = document.getElementById('mainContent');
  if(activeTab==='dashboard') c.innerHTML = renderDash();
  else if(activeTab==='viewer') c.innerHTML = renderViewer();
  else if(activeTab==='input') c.innerHTML = renderInput();
  else c.innerHTML = renderLibrary();
}

function destroyCharts(){
  Object.values(charts).forEach(ch=>{ try{ch.destroy();}catch(e){} });
  charts = {};
}

// ─── HELPERS ───
function rrBadge(rr){
  if(!rr)return'';
  const m={'EHS-1':'ehs1','EHS-2':'ehs2','EHS-3':'ehs3','EHS-4':'ehs4'};
  return `<span class="badge b-${m[rr]||'ehs2'}">${rr}</span>`;
}
function sigBadge(s){
  if(!s)return'';
  return `<span class="badge b-${s==='S'?'sig':'nsig'}">${s==='S'?'Significant':'Non-Sig'}</span>`;
}
function domBadge(d){
  const st=DOMAIN_STYLE[d]||'background:#F1EFE8;color:#5F5E5A';
  return `<span class="b-domain" style="${st}">${d}</span>`;
}
function rcChips(rc){
  if(!rc)return'';
  return rc.split(',').filter(Boolean).map(id=>{
    const it=libData.find(l=>l.id===id.trim());
    if(!it)return'';
    const c=M6_COLORS[it.m]||'#888';
    const bg=M6_BG[it.m]||'#eee';
    return `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500;background:${bg};color:${c};margin:1px;border:1px solid ${c}22" title="${it.impact}"><i class="ti ${M6_ICONS[it.m]||'ti-circle'}" style="font-size:9px"></i>${it.m.slice(0,2)}: ${it.hazard.slice(0,28)}${it.hazard.length>28?'…':''}</span>`;
  }).join('');
}

// ─── DASHBOARD ───
function renderDash(){
  const all = hazidData;
  const lib = libData;
  const ehs3 = all.filter(d=>d.rr==='EHS-3').length;
  const ehs4 = all.filter(d=>d.rr==='EHS-4').length;
  const sig = all.filter(d=>d.sig==='S').length;

  const mCounts={Man:0,Machine:0,Material:0,Method:0,Measurement:0,Milieu:0};
  all.forEach(d=>{
    if(d.rootCause) d.rootCause.split(',').forEach(id=>{
      const it=lib.find(l=>l.id===id.trim());
      if(it && mCounts[it.m]!==undefined) mCounts[it.m]++;
    });
  });

  const sections=[...new Set(all.map(d=>d.section))];
  const sBySec=sections.map(s=>({s,h:all.filter(d=>d.section===s&&(d.rr==='EHS-3'||d.rr==='EHS-4')).length,n:all.filter(d=>d.section===s).length}));

  const html=`
<div class="stats-grid">
  <div class="stat-card"><div class="label">Total entri HAZID</div><div class="value">${all.length}</div><div class="sub">dari semua section</div></div>
  <div class="stat-card danger"><div class="label">High + Kritis (EHS-3/4)</div><div class="value">${ehs3+ehs4}</div><div class="sub">${ehs4} kritis (EHS-4)</div></div>
  <div class="stat-card warn"><div class="label">Significant impact</div><div class="value">${sig}</div><div class="sub">perlu tindak lanjut</div></div>
  <div class="stat-card info"><div class="label">Library 6M</div><div class="value">${lib.length}</div><div class="sub">entri root cause</div></div>
</div>

<div class="m6-summary">
${Object.entries(mCounts).map(([m,n])=>`
<div class="m6-card">
  <div class="m6-icon"><i class="ti ${M6_ICONS[m]}" style="color:${M6_COLORS[m]}"></i></div>
  <div class="m6-name" style="color:${M6_COLORS[m]}">${m}</div>
  <div class="m6-count" style="color:${M6_COLORS[m]}">${n}</div>
  <div class="m6-sub">referensi</div>
</div>`).join('')}
</div>

<div class="chart-grid">
  <div class="chart-card">
    <h3>Root cause dominan (6M)</h3>
    <div class="chart-wrap"><canvas id="dC1" role="img" aria-label="Bar chart root cause 6M">Data 6M.</canvas></div>
  </div>
  <div class="chart-card">
    <h3>High risk per section</h3>
    <div class="chart-wrap"><canvas id="dC2" role="img" aria-label="Bar chart high risk per section">Data per section.</canvas></div>
  </div>
</div>

<div class="chart-grid">
  <div class="chart-card">
    <h3>Distribusi risk level</h3>
    <div class="chart-wrap" style="height:180px"><canvas id="dC3" role="img" aria-label="Donut risk level">Data risk.</canvas></div>
  </div>
  <div class="chart-card">
    <h3>Distribusi kategori bahaya</h3>
    <div class="chart-wrap" style="height:180px"><canvas id="dC4" role="img" aria-label="Pie kategori">Data kategori.</canvas></div>
  </div>
</div>`;

  setTimeout(()=>{
    const mL=Object.keys(mCounts), mV=Object.values(mCounts), mC=Object.values(M6_COLORS);
    const c1=document.getElementById('dC1');
    if(c1) charts.c1=new Chart(c1,{type:'bar',data:{labels:mL,datasets:[{label:'Ref.',data:mV,backgroundColor:mC.map(c=>c+'99'),borderColor:mC,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1},beginAtZero:true}}}});
    const c2=document.getElementById('dC2');
    if(c2) charts.c2=new Chart(c2,{type:'bar',data:{labels:sBySec.map(x=>x.s),datasets:[{label:'High Risk',data:sBySec.map(x=>x.h),backgroundColor:'#A32D2D99',borderColor:'#A32D2D',borderWidth:1.5,borderRadius:4},{label:'Total',data:sBySec.map(x=>x.n),backgroundColor:'#185FA566',borderColor:'#185FA5',borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{size:11},boxWidth:10}}},scales:{x:{ticks:{font:{size:11},autoSkip:false}},y:{ticks:{stepSize:1},beginAtZero:true}}}});
    const rrMap={'EHS-1':0,'EHS-2':0,'EHS-3':0,'EHS-4':0};
    all.forEach(d=>{if(rrMap[d.rr]!==undefined)rrMap[d.rr]++;});
    const c3=document.getElementById('dC3');
    if(c3) charts.c3=new Chart(c3,{type:'doughnut',data:{labels:Object.keys(rrMap),datasets:[{data:Object.values(rrMap),backgroundColor:['#1D9E75','#185FA5','#BA7517','#A32D2D'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}}}});

// ─── VIEWER ───
function renderViewer(){
  const sections=[...new Set(hazidData.map(d=>d.section))];
  let rows=[...hazidData];
  if(filt.section!=='all') rows=rows.filter(d=>d.section===filt.section);
  if(filt.rr!=='all') rows=rows.filter(d=>d.rr===filt.rr);
  if(filt.sig!=='all') rows=rows.filter(d=>d.sig===filt.sig);
  if(filt.m6!=='all') rows=rows.filter(d=>{
    if(!d.rootCause)return false;
    return d.rootCause.split(',').some(id=>{const it=libData.find(l=>l.id===id.trim());return it&&it.m===filt.m6;});
  });
  if(filt.search) rows=rows.filter(d=>[d.activity,d.sub,d.hazard,d.consequence,d.section].join(' ').toLowerCase().includes(filt.search.toLowerCase()));

  const secOpts=sections.map(s=>`<option value="${s}" ${filt.section===s?'selected':''}>${s}</option>`).join('');
  const trows=rows.map(d=>`<tr>
    <td><span style="font-size:10px;background:#F5F6F8;padding:2px 6px;border-radius:4px;border:1px solid #E2E4E8;white-space:nowrap">${d.section}</span></td>

    <td>${rrBadge(d.rr)}</td>

    <td><button class="btn-del" onclick="deleteHazid('${d.id}')" title="Hapus entri ini"><i class="ti ti-trash"></i></button></td>
  </tr>`).join('');

  return `
<div class="toolbar">
  <select onchange="filt.section=this.value;render()"><option value="all">Semua section</option>${secOpts}</select>
  <select onchange="filt.rr=this.value;render()"><option value="all">Semua risk level</option><option>EHS-1</option><option>EHS-2</option><option>EHS-3</option><option>EHS-4</option></select>
  <select onchange="filt.sig=this.value;render()"><option value="all">Semua signifikansi</option><option value="S">Significant</option><option value="NS">Non-Significant</option></select>
  <select onchange="filt.m6=this.value;render()"><option value="all">Semua 6M</option><option>Man</option><option>Machine</option><option>Material</option><option>Method</option><option>Measurement</option><option>Milieu</option></select>
  <input type="text" placeholder="Cari hazard, aktivitas, section..." value="${filt.search}" oninput="filt.search=this.value;render()">
  <span class="count">${rows.length} entri</span>
</div>
<div class="table-wrap">
<div class="table-scroll">
<table>
<thead><tr><th>Section</th><th>Aktivitas</th><th>Sub-aktivitas</th><th>Hazard / Aspek</th><th>Root cause (6M)</th><th>Risk</th><th>Sig.</th><th></th></tr></thead>
<tbody>${trows||'<tr><td colspan="8"><div class="empty"><i class="ti ti-inbox-off"></i><p>Tidak ada data yang sesuai filter</p></div></td></tr>'}</tbody>
</table>
</div>
</div>`;
}

    showToast('Entri dihapus');

};

window.toggleRC = (id) => {
  const idx = formRC.indexOf(id);
  if(idx>=0) formRC.splice(idx,1);
  else formRC.push(id);
  updateRCBox();
  const chips = document.querySelectorAll(`[onclick="toggleRC('${id}')"]`);
  chips.forEach(c=>c.classList.toggle('selected',formRC.includes(id)));
};

function updateRCBox(){
  const box = document.getElementById('rcBox');
  if(!box)return;
  const lib = libData;
  box.innerHTML = '';
  if(formRC.length===0){
    box.innerHTML='<span class="rc-placeholder">Klik chip di panel kanan untuk menambahkan root cause...</span>';
    return;
  }
  formRC.forEach(id=>{
    const it=lib.find(l=>l.id===id);
    if(!it)return;
    const c=M6_COLORS[it.m]||'#888';
    const bg=M6_BG[it.m]||'#eee';
    const span=document.createElement('span');
    span.className='rc-chip';
    span.style=`background:${bg};color:${c};border-color:${c}33`;
    span.innerHTML=`<i class="ti ${M6_ICONS[it.m]}" style="font-size:10px"></i> ${it.m}: ${it.hazard.slice(0,26)}… <i class="ti ti-x" style="font-size:10px"></i>`;
    span.onclick=()=>toggleRC(id);
    box.appendChild(span);
  });
}

window.filterPanel = () => {
  const q = (document.getElementById('panelQ')?.value||'').toLowerCase();
  const lib = libData;
  const mGroups={Man:[],Machine:[],Material:[],Method:[],Measurement:[],Milieu:[]};
  lib.filter(it=>!q||it.hazard.toLowerCase().includes(q)||it.m.toLowerCase().includes(q)||it.impact.toLowerCase().includes(q)).forEach(it=>{if(mGroups[it.m])mGroups[it.m].push(it);});
  const html=Object.entries(mGroups).map(([m,items])=>items.length?`
<div class="m6-section">
  <div class="m6-section-title" style="color:${M6_COLORS[m]}"><i class="ti ${M6_ICONS[m]}"></i>${m}</div>
  <div>${items.map(it=>`<span class="chip ${formRC.includes(it.id)?'selected':''}" onclick="toggleRC('${it.id}')" title="${it.impact}">${it.ippi?'<span class="star">★</span>':''} ${it.hazard.slice(0,38)}${it.hazard.length>38?'…':''}</span>`).join('')}</div>
</div>`:'').join('');
  const pc=document.getElementById('panelContent');
  if(pc) pc.innerHTML=html||'<div style="font-size:12px;color:var(--text3);padding:8px">Tidak ditemukan</div>';
};

window.calcRL = () => {
  const sr=document.getElementById('fsr')?.value;
  const ll=document.getElementById('fll')?.value;
  const box=document.getElementById('rlBox');
  if(!box)return;
  if(sr&&ll){
    const code=sr+ll, rr=RISK_MATRIX[code]||'-';
    box.style.display='';
    document.getElementById('rlCode').textContent='Kode: '+code;
    document.getElementById('rlBadge').innerHTML=rrBadge(rr);
  } else box.style.display='none';
};

window.previewCtrl = () => {
  const v=(document.getElementById('fctrl')?.value||'').split(',').map(n=>n.trim()).filter(Boolean);
  const p=document.getElementById('ctrlPrev');
  if(!p)return;
  p.innerHTML=v.map(n=>CONTROLS[n]?`<span style="display:inline-block;background:#F5F6F8;border:1px solid #E2E4E8;border-radius:4px;padding:1px 6px;font-size:10px;margin:1px">${n}. ${CONTROLS[n]}</span>`:'').join('');
};

window.resetForm = () => {
  formRC=[];
  ['fs','fa','fsub','fhaz','fcons','fsr','fll','fsig','fctrl','flegal'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['fR','fNR','fN','fA','fE'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
  const rlb=document.getElementById('rlBox');if(rlb)rlb.style.display='none';
  updateRCBox();
  const cp=document.getElementById('ctrlPrev');if(cp)cp.innerHTML='';
  const pp=document.getElementById('panelQ');if(pp){pp.value='';filterPanel();}
};

window.submitHazid = async () => {
  const section=document.getElementById('fs')?.value;
  const sub=document.getElementById('fsub')?.value?.trim();
  const haz=document.getElementById('fhaz')?.value?.trim();
  const cons=document.getElementById('fcons')?.value?.trim();
  if(!section||!sub||!haz||!cons){showToast('Isi semua field wajib (*)','error');return;}
  const sr=document.getElementById('fsr')?.value;
  const ll=document.getElementById('fll')?.value;
  const rlc=sr&&ll?sr+ll:'';
  const data={
    section,
    activity:document.getElementById('fa')?.value||'',
    sub,hazard:haz,consequence:cons,
    rootCause:formRC.join(','),
    category:document.getElementById('fcat')?.value||'',
    conditions:{R:document.getElementById('fR')?.checked||false,NR:document.getElementById('fNR')?.checked||false,N:document.getElementById('fN')?.checked||false,A:document.getElementById('fA')?.checked||false,E:document.getElementById('fE')?.checked||false},
    sr,ll:ll?parseInt(ll):0,rr:rlc?RISK_MATRIX[rlc]||'':'',
    sig:document.getElementById('fsig')?.value||'',
    controls:document.getElementById('fctrl')?.value||'',
    legal:document.getElementById('flegal')?.value||'',
    createdAt:serverTimestamp(),
    createdBy:currentUser.email
  };
  try{
    await addDoc(collection(db,'hazid'),data);
    showToast('Entri HAZID tersimpan!');
    resetForm();
  }catch(e){showToast('Gagal menyimpan: '+e.message,'error');}
};

// ─── LIBRARY ───
function renderLibrary(){
  const lib=libData;
  const ms=['Man','Machine','Material','Method','Measurement','Milieu'];
  let items=lib.filter(it=>it.m===libFilter.m);
  if(libFilter.search) items=items.filter(it=>it.hazard.toLowerCase().includes(libFilter.search.toLowerCase())||it.impact.toLowerCase().includes(libFilter.search.toLowerCase()));
  if(libFilter.domain!=='all') items=items.filter(it=>(it.domains||[]).includes(libFilter.domain));

  const tabs=ms.map(m=>`<button class="lib-tab ${libFilter.m===m?'active':''}" onclick="setLibM('${m}')" style="${libFilter.m===m?'border-color:'+M6_COLORS[m]+';color:'+M6_COLORS[m]+';background:'+M6_BG[m]:''}">
    <i class="ti ${M6_ICONS[m]}" style="font-size:14px"></i>${m} <span style="font-size:10px;font-weight:400">(${lib.filter(l=>l.m===m).length})</span>
  </button>`).join('');

  const rows=items.map((it,i)=>`
<div class="lib-item">
  <div class="lib-num" style="background:${M6_BG[it.m]||'#eee'};color:${M6_COLORS[it.m]||'#888'}">${i+1}</div>
  <div class="lib-text">
    <div class="lib-hazard">${it.ippi?`<i class="ti ti-star" style="font-size:11px;color:var(--blue)" title="Relevan IPPI"></i> `:''}${it.hazard}</div>
    <div class="lib-impact">Dampak: ${it.impact}</div>
    <div>${(it.domains||[]).map(d=>domBadge(d)).join('')}</div>
    ${it.note?`<div class="lib-note"><i class="ti ti-info-circle" style="font-size:11px"></i>${it.note}</div>`:''}
  </div>
  ${!it.isDefault?`<button class="btn-del" onclick="deleteLib('${it.id}')" aria-label="Hapus"><i class="ti ti-trash"></i></button>`:'<div style="width:32px"></div>'}
</div>`).join('');

  return `
<div class="lib-tabs">${tabs}</div>
<div class="lib-toolbar">
  <input type="text" placeholder="Cari di library ${libFilter.m}..." value="${libFilter.search}" oninput="libFilter.search=this.value;renderL()">
  <select onchange="libFilter.domain=this.value;renderL()" style="height:34px">
    <option value="all">Semua domain</option><option>HSE</option><option>Quality</option><option>Operational</option><option>Environment</option><option>Compliance</option><option>Measurement</option>
  </select>
  <span style="font-size:12px;color:var(--text3);line-height:34px;white-space:nowrap">${items.length} entri</span>
</div>
<div class="lib-list">
  ${rows||'<div class="empty"><i class="ti ti-inbox-off"></i><p>Tidak ada entri</p></div>'}
</div>
<div class="add-form">
  <h4><i class="ti ti-plus" style="color:var(--blue)"></i> Tambah entri baru — ${libFilter.m}</h4>
  <div class="form-grid" style="max-width:100%">
    <div class="fg full"><label>Hazard / faktor penyebab <span class="req">*</span></label>
      <input type="text" id="lhaz" placeholder="Deskripsi hazard atau faktor root cause yang ingin ditambahkan"></div>
    <div class="fg full"><label>Dampak potensial <span class="req">*</span></label>
      <input type="text" id="limp" placeholder="Apa yang bisa terjadi akibat faktor ini"></div>
    <div class="fg"><label>Domain (pisahkan koma)</label>
      <input type="text" id="ldom" placeholder="HSE,Quality,Operational"></div>
    <div class="fg"><label>Catatan / contoh spesifik</label>
      <input type="text" id="lnote" placeholder="Referensi atau contoh di area IPPI"></div>
    <div class="fg" style="display:flex;align-items:center;gap:8px;padding-top:14px">
      <label style="display:flex;align-items:center;gap:6px;font-weight:400;font-size:13px;cursor:pointer"><input type="checkbox" id="lippi"> Relevan untuk PT. IPPI</label>
    </div>
    <div class="fg full" style="display:flex;gap:10px;padding-top:4px">
      <button class="btn-primary" onclick="addLib()"><i class="ti ti-device-floppy"></i> Tambah ke library</button>
    </div>
  </div>
</div>`;
}

window.setLibM=(m)=>{libFilter.m=m;libFilter.search='';libFilter.domain='all';render();};
window.renderL=()=>{document.getElementById('mainContent').innerHTML=renderLibrary();};

window.addLib = async () => {
  const haz=document.getElementById('lhaz')?.value?.trim();
  const imp=document.getElementById('limp')?.value?.trim();
  if(!haz||!imp){showToast('Isi hazard dan dampak','error');return;}
  const domRaw=document.getElementById('ldom')?.value||'Operational';
  const domains=domRaw.split(',').map(d=>d.trim()).filter(Boolean);
  try{
    await addDoc(collection(db,'library6m'),{
      m:libFilter.m, hazard:haz, impact:imp, domains,
      ippi:document.getElementById('lippi')?.checked||false,
      note:document.getElementById('lnote')?.value||'',
      isDefault:false,
      createdAt:serverTimestamp(),
      createdBy:currentUser.email
    });
    showToast('Entri library tersimpan!');
    ['lhaz','limp','ldom','lnote'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const li=document.getElementById('lippi');if(li)li.checked=false;
  }catch(e){showToast('Gagal menyimpan: '+e.message,'error');}
};

window.deleteLib = async (id) => {
  if(!confirm('Hapus entri library ini?')) return;
  try{
    await deleteDoc(doc(db,'library6m',id));
    showToast('Entri dihapus');
  }catch(e){showToast('Gagal: '+e.message,'error');}
};

// ─── TOAST ───
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='error'?'error':'success');
  t.style.display='flex';
  setTimeout(()=>t.style.display='none',3000);
}

// Expose globals
window.filt=filt;
window.libFilter=libFilter;
window.formRC=formRC;
</script>
</body>
</html>
